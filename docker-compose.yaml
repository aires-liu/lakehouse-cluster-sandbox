services:
  spark-master:
    image: bitnami/spark:3.3.0
    container_name: spark-master
    environment:
      SPARK_MODE: master
    ports:
      - "8080"

  spark-worker:
    image: bitnami/spark:3.3.0
    container_name: spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
    depends_on:
      - spark-master

  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./cluster_resources/postgres_utils/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql

  airflow-webserver:
    build:
      context: .
      dockerfile: dockerfile.airflow
    image: custom-airflow:sandbox
    container_name: airflow-webserver
    environment:
      AIRFLOW_ROLE: webserver
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:password@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: password
    ports:
      - "8080"
    depends_on:
      - spark-master
      - postgres
    volumes:
      - ./dags:/opt/airflow/dags
      - ./cluster_resources/airflow_utils/entrypoint.sh:/entrypoint.sh

  airflow-scheduler:
    build:
      context: .
      dockerfile: dockerfile.airflow
    image: custom-airflow:sandbox
    container_name: airflow-scheduler
    environment:
      AIRFLOW_ROLE: scheduler
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:password@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: password
    depends_on:
      - postgres
    volumes:
      - ./dags:/opt/airflow/dags
      - ./cluster_resources/airflow_utils/entrypoint.sh:/entrypoint.sh

  hive:
    build:
      context: .
      dockerfile: dockerfile.hive
    image: custom-hive:sandbox
    container_name: hive
    depends_on:
      - minio
      - postgres

  minio:
    build:
      context: .
      dockerfile: dockerfile.minio
    image: custom-minio:sandbox
    container_name: minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      S3_PATH_STYLE_ACCESS: "true"
    ports:
      - "9000"
      - "9090"
    volumes:
      - minio-data:/data

volumes:
  minio-data:
    driver: local
  postgres-data:
    driver: local
